<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NexaBot — AI Customer Support</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14;
    --surface: #161820;
    --surface2: #1e2028;
    --surface3: #252830;
    --border: rgba(255,255,255,0.07);
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --text: #e8eaf0;
    --muted: #8892a4;
    --bot-bubble: #1e2028;
    --user-bubble: #6c63ff;
    --success: #22d3a0;
    --radius: 16px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }
  /* Sidebar */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 16px;
    gap: 8px;
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    margin-bottom: 16px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    padding: 0 12px;
    margin: 8px 0 4px;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    color: var(--muted);
    transition: all 0.2s;
  }
  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { background: rgba(108,99,255,0.15); color: var(--accent2); }
  .sidebar-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .stats-card {
    margin-top: auto;
    background: var(--surface2);
    border-radius: 12px;
    padding: 16px;
    border: 1px solid var(--border);
  }
  .stats-card h4 { font-size: 12px; color: var(--muted); margin-bottom: 10px; font-weight: 500; }
  .stat-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
  .stat-val { color: var(--accent2); font-weight: 600; }
  /* Main chat area */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .bot-avatar {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .bot-info h2 { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; }
  .bot-info p { font-size: 12px; color: var(--success); display: flex; align-items: center; gap: 5px; }
  .online-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; display: inline-block; }
  .session-id { font-size: 12px; color: var(--muted); background: var(--surface2); padding: 4px 10px; border-radius: 6px; }
  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }
  .msg-row { display: flex; gap: 12px; max-width: 75%; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.bot { align-self: flex-start; }
  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .msg-avatar.bot-av { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg-avatar.user-av { background: var(--surface3); }
  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-line;
  }
  .bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .user .bubble { background: var(--user-bubble); color: #fff; border-top-right-radius: 4px; }
  .timestamp { font-size: 11px; color: var(--muted); margin-top: 4px; text-align: right; }
  .bot .timestamp { text-align: left; }
  /* Typing indicator */
  .typing-dots { display: flex; gap: 5px; padding: 6px 2px; }
  .typing-dots span {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }
  /* Suggestions */
  .suggestions {
    padding: 0 24px 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .suggestion-btn {
    font-size: 12px;
    color: var(--accent2);
    background: rgba(108,99,255,0.1);
    border: 1px solid rgba(108,99,255,0.25);
    border-radius: 20px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .suggestion-btn:hover { background: rgba(108,99,255,0.25); }
  /* Input area */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border 0.2s;
  }
  textarea:focus { border-color: rgba(108,99,255,0.5); }
  textarea::placeholder { color: var(--muted); }
  .send-btn {
    width: 44px; height: 44px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--accent2); transform: scale(1.05); }
  .send-btn:active { transform: scale(0.97); }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    NexaBot
  </div>
  <div class="sidebar-label">Menu</div>
  <div class="sidebar-item active"><span class="icon">💬</span> Live Chat</div>
  <div class="sidebar-item" onclick="loadHistory()"><span class="icon">📜</span> History</div>
  <div class="sidebar-item"><span class="icon">❓</span> FAQ Docs</div>
  <div class="sidebar-item"><span class="icon">⚙️</span> Settings</div>

  <div class="stats-card">
    <h4>SESSION STATS</h4>
    <div class="stat-row"><span>Messages</span><span class="stat-val" id="stat-msgs">0</span></div>
    <div class="stat-row"><span>Sessions</span><span class="stat-val" id="stat-sessions">—</span></div>
    <div class="stat-row"><span>Total logs</span><span class="stat-val" id="stat-total">—</span></div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="bot-avatar">🤖</div>
      <div class="bot-info">
        <h2>NexaBot Support</h2>
        <p><span class="online-dot"></span> Online — Ready to help</p>
      </div>
    </div>
    <span class="session-id" id="session-display">Session: loading…</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion-btn" onclick="sendSuggestion('What are your business hours?')">🕐 Business hours</button>
    <button class="suggestion-btn" onclick="sendSuggestion('How do I track my order?')">📦 Track order</button>
    <button class="suggestion-btn" onclick="sendSuggestion('What is your return policy?')">↩️ Returns</button>
    <button class="suggestion-btn" onclick="sendSuggestion('What payment methods do you accept?')">💳 Payments</button>
  </div>

  <div class="input-area">
    <textarea id="user-input" placeholder="Type your message…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</main>

<script>
const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);
let msgCount = 0;
document.getElementById('session-display').textContent = 'Session: ' + sessionId.substr(-6).toUpperCase();

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function getNow() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function appendMessage(role, text, time) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;

  const avatar = role === 'bot'
    ? `<div class="msg-avatar bot-av">🤖</div>`
    : `<div class="msg-avatar user-av">👤</div>`;

  row.innerHTML = avatar + `
    <div>
      <div class="bubble">${text}</div>
      <div class="timestamp">${time || getNow()}</div>
    </div>`;

  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  msgCount++;
  document.getElementById('stat-msgs').textContent = msgCount;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-row';
  row.innerHTML = `<div class="msg-avatar bot-av">🤖</div>
    <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('suggestions').style.display = 'none';
  appendMessage('user', text);
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId })
    });
    const data = await res.json();
    removeTyping();
    appendMessage('bot', data.response, data.timestamp);
    loadStats();
  } catch (e) {
    removeTyping();
    appendMessage('bot', 'Sorry, I encountered an error. Please try again.');
  }
}

function sendSuggestion(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function loadStats() {
  const res = await fetch('/api/stats');
  const data = await res.json();
  document.getElementById('stat-total').textContent = data.total_messages;
  document.getElementById('stat-sessions').textContent = data.sessions;
}

async function loadHistory() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  const res = await fetch('/api/history/' + sessionId);
  const data = await res.json();
  data.forEach(m => appendMessage(m.role === 'user' ? 'user' : 'bot', m.message));
}

// Initial bot greeting
window.onload = () => {
  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      removeTyping();
      appendMessage('bot', 'Hello! 👋 Welcome to NexaBot Support.\n\nI\'m here to help you with orders, payments, returns, and more. You can also use the quick-access buttons below or type your question directly!');
      loadStats();
    }, 1000);
  }, 400);
};
</script>
</body>
</html>
